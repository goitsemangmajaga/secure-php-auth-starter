name: PHP Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  php-lint:
    name: Validate PHP syntax
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install PHP CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: Lint PHP files
        run: |
          find config public scripts src -type f -name "*.php" -print0 \
            | xargs -0 -n1 php -l
